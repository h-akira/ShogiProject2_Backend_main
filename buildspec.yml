version: 0.2

env:
  variables:
    REGION: ap-northeast-1

phases:
  install:
    runtime-versions:
      python: 3.13
  build:
    commands:
      # Debug: environment before sam build
      - echo "=== BEFORE sam build ==="
      - which python && python --version
      - python -c "import sys; print('executable:', sys.executable); print('path:', sys.path)"
      - echo "PATH=$PATH"
      - pyenv versions || true
      - ls -la .python-version 2>/dev/null || echo "No .python-version file"
      - sam build
      # Debug: environment after sam build
      - echo "=== AFTER sam build ==="
      - which python && python --version
      - python -c "import sys; print('executable:', sys.executable); print('path:', sys.path)"
      - echo "PATH=$PATH"
      - ls -la .python-version 2>/dev/null || echo "No .python-version file"
  post_build:
    commands:
      # Debug: environment in post_build
      - echo "=== POST_BUILD ==="
      - which python && python --version
      - python -c "import sys; print('executable:', sys.executable); print('path:', sys.path)"
      - echo "PATH=$PATH"
      - ls -la .python-version 2>/dev/null || echo "No .python-version file"
      - python -m pip install -r migrations/requirements.txt
      - python -m pip show aurora-dsql-python-connector || echo "pip show FAILED"
      - python -m pip list | grep -i aurora || echo "not in pip list"
      - ls /root/.pyenv/versions/3.13.8/lib/python3.13/site-packages/ | grep aurora || echo "no aurora dir in site-packages"
      - python -c "import sys; print(sys.executable); import aurora_dsql_python_connector; print('import OK')" || echo "import FAILED"
      - python3.13 -c "import aurora_dsql_python_connector; print('import OK via python3.13')" || echo "python3.13 import FAILED"
      - /root/.pyenv/versions/3.13.8/bin/python -c "import aurora_dsql_python_connector; print('import OK via full path')" || echo "full path import FAILED"
