version: 0.2

env:
  variables:
    REGION: ap-northeast-1

phases:
  install:
    runtime-versions:
      python: 3.13
  build:
    commands:
      # Debug: environment before sam build
      - echo "=== BEFORE sam build ==="
      - which python && python --version
      - python -c "import sys; print('executable:', sys.executable); print('path:', sys.path)"
      - echo "PATH=$PATH"
      - pyenv versions || true
      - ls -la .python-version 2>/dev/null || echo "No .python-version file"
      - sam build
      # Debug: environment after sam build
      - echo "=== AFTER sam build ==="
      - which python && python --version
      - python -c "import sys; print('executable:', sys.executable); print('path:', sys.path)"
      - echo "PATH=$PATH"
      - ls -la .python-version 2>/dev/null || echo "No .python-version file"
  post_build:
    commands:
      # Debug: environment in post_build
      - echo "=== POST_BUILD ==="
      - which python && python --version
      - python -c "import sys; print('executable:', sys.executable); print('path:', sys.path)"
      - echo "PATH=$PATH"
      - ls -la .python-version 2>/dev/null || echo "No .python-version file"
      - python -m pip install -r migrations/requirements.txt
      - python -c "import aurora_dsql_python_connector; print('import OK')" || echo "import FAILED"
      - python migrations/migrate.py --endpoint dummy --region ${REGION} || true
